# Configuração mínima do ruff (lint + formatação) para o EsquizoCap.
# Rode `ruff check` e `ruff format` antes de considerar uma mudança pronta.

line-length = 120
target-version = "py312"

# Ignora o ambiente virtual e o export do Godot na varredura.
extend-exclude = [".venv", "engine"]

[lint]
# Conjunto enxuto: erros do pyflakes (F), estilo pycodestyle (E),
# imports (I) e modernização de sintaxe (UP).
select = ["E", "F", "I", "UP"]

# E501 (linha longa) fica desligado: era por causa do main.py Tkinter legado, com
# dezenas de linhas acima de 200 colunas. Esse código foi arquivado em
# interface_tkinter_legado/, na raiz — que NÃO está no extend-exclude abaixo, então
# ainda é varrido por este lint. Religar E501 exige excluir essa pasta primeiro (ou
# aceitar que ela também seja corrigida).
ignore = ["E501"]
